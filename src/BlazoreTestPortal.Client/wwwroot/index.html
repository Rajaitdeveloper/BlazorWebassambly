<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tindo Blazor · Test Portal</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/app.css">

    <style>
        /* ── Splash screen ── */
        .app-loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #345181; z-index: 2000; overflow: hidden;
        }

        .app-loading::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .app-loading::after {
            content: ''; position: absolute;
            width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(200,23,102,.25) 0%, transparent 70%);
            top: 40%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .splash-inner {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 14px;
        }

        .splash-logo {
            width: 56px; height: 56px; border-radius: 14px;
            background: #c81766;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 22px;
            box-shadow: 0 8px 24px rgba(200,23,102,.4);
            animation: logo-pop .5s cubic-bezier(.34,1.56,.64,1) both;
        }

        .splash-brand {
            font-family: 'Lora', Georgia, serif;
            font-size: 26px; font-weight: 600; color: #fff;
            animation: fade-up .4s .15s ease both;
        }

        .splash-sub {
            font-size: 11px; font-weight: 700; letter-spacing: 2px;
            color: rgba(255,255,255,.4); margin-top: -8px;
            animation: fade-up .4s .2s ease both;
        }

        .splash-dots { display: flex; gap: 7px; margin-top: 6px; animation: fade-up .4s .3s ease both; }

        .splash-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: #c81766; animation: bounce .9s ease-in-out infinite;
        }

        .splash-dots span:nth-child(2) { animation-delay: .15s; background: #04595a; }
        .splash-dots span:nth-child(3) { animation-delay: .30s; }

        @keyframes logo-pop { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
        @keyframes fade-up  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce   { 0%, 80%, 100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-7px); opacity: 1; } }
    </style>
</head>
<body>

    <div id="app">
        <div class="app-loading">
            <div class="splash-inner">
                <div class="splash-logo"><i class="fa-solid fa-bolt"></i></div>
                <div class="splash-brand">Tindo Blazor</div>
                <div class="splash-sub">TEST PORTAL</div>
                <div class="splash-dots"><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script>window.appTheme.init();</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>

</body>
</html>
